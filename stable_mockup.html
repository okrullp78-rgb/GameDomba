<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GameDomba — Kandang</title>
  <link rel="stylesheet" href="shop_style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Kandang</h1>
      <div class="hud"><div class="credit">Credits: <span id="credits">100</span></div></div>
    </header>
    <main>
      <section class="screen active">
        <h2>SiBulu (Level 2)</h2>
        <div class="stable-grid">
          <div class="card status-card" id="sheepStatus">
            <h4>Status</h4>
            <p>Stamina: <span id="stamina">72</span></p>
            <p>Strength: <span id="strength">12</span></p>
            <p>Speed: <span id="speed">11</span></p>
          </div>
          <div class="card">
            <h4>Aksi</h4>
            <button id="feedBtn">Beri Pakan Biasa</button>
            <button id="trainBtn">Latihan</button>
            <button id="restBtn">Istirahat</button>
          </div>
        </div>
      </section>
    </main>
    <footer>
      <nav>
        <a href="shop_mockup.html"><button>Toko</button></a>
        <a href="compete_mockup.html"><button>Adu</button></a>
      </nav>
    </footer>
  </div>
  <script>
    let stamina = 72;
    let strength = 12;
    let speed = 11;
    const statusCard = document.getElementById('sheepStatus');
    const staminaEl = document.getElementById('stamina');
    const strengthEl = document.getElementById('strength');
    const speedEl = document.getElementById('speed');

    function updateStats() {
      staminaEl.textContent = stamina;
      strengthEl.textContent = strength;
      speedEl.textContent = speed;
      statusCard.classList.add('pulse');
      setTimeout(() => statusCard.classList.remove('pulse'), 400);
    }

    updateStats();

    document.getElementById('feedBtn').addEventListener('click', () => {
      stamina = Math.min(100, stamina + 15);
      updateStats();
    });

    document.getElementById('trainBtn').addEventListener('click', () => {
      if (stamina >= 10) {
        stamina -= 10;
        strength += 1;
        speed += 0.5;
        updateStats();
        alert('Latihan selesai: +XP & +Strength');
      }
    });

    document.getElementById('restBtn').addEventListener('click', () => {
      stamina = Math.min(100, stamina + 12);
      updateStats();
      alert('Domba beristirahat, stamina pulih.');
    });
  </script>
</body>
</html>
